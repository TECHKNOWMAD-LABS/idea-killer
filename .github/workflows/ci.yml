name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Restrict GITHUB_TOKEN to read-only at workflow level. Jobs that need
# write access (publish, deploy) declare their own `permissions:` block.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov hypothesis

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Bandit security scan
        run: bandit -r src/ -ll -q

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=ideakiller --cov-report=term-missing --cov-fail-under=80
